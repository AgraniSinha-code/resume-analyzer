<html>
<head>
    <title>Resume Analyzer</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body style="font-family: Poppins; background: linear-gradient(to right, #667eea, #764ba2);">

<div class="container mt-5">
    <div class="card shadow-lg p-4 text-center" style="border-radius: 15px; max-width: 450px; margin: auto;">

        <!-- Title -->
        <h2 class="mb-4" style="color:#667eea; font-weight:600;">
            🚀 AI Resume Analyzer
        </h2>

        <!-- Form -->
        <form method="POST" enctype="multipart/form-data">

            <!-- File Upload -->
            <input type="file" name="resume" class="form-control mb-3" required>

            <!-- Role Selection -->
            <select name="role" class="form-control mb-3">
                <option value="web developer">Web Developer</option>
                <option value="backend developer">Backend Developer</option>
                <option value="data analyst">Data Analyst</option>
            </select>

            <!-- Button -->
            <button type="submit" 
                onclick="this.innerText='Analyzing...';" 
                style="background:#667eea; color:white; padding:10px 20px; border:none; border-radius:8px;">
                Analyze Resume
            </button>

        </form>

    </div>
</div>

</body>
</html>
